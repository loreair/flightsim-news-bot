const SIMS = [
  { id: "MSFS", label: "MSFS 2024", color: "#0078d4" },
  { id: "XP", label: "X-Plane 12", color: "#1ab3e8" },
  { id: "DCS", label: "DCS World", color: "#e6a817" },
  { id: "FALCON", label: "Falcon BMS", color: "#2e6da4" },
];
const SIM_COLORS = { MSFS: "#0078d4", DCS: "#e6a817", "X-Plane": "#1ab3e8", "Falcon BMS": "#2e6da4", General: "#7f8c8d" };
const SIM_LOGO_MAP = { MSFS: "MSFS", DCS: "DCS", "X-Plane": "XP", "Falcon BMS": "FALCON" };

function Badge({ sim }) {
  const c = SIM_COLORS[sim] || "#7f8c8d";
  const logoKey = SIM_LOGO_MAP[sim];
  const logo = logoKey ? LOGOS[logoKey] : null;
  return <span style={{ fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:20, background:c+"33", color:c, whiteSpace:"nowrap", display:"inline-flex", alignItems:"center", gap:6 }}>{logo && <img src={logo} alt={sim} style={{ height:13, width:"auto", objectFit:"contain" }} />}{sim}</span>;
}

function App() {
  const [token, setToken] = useState("");
  const [chatId, setChatId] = useState("");
  const [selected, setSelected] = useState(["MSFS","XP","DCS","FALCON"]);
  const [news, setNews] = useState([]);
  const [loading, setLoading] = useState(false);
  const [status, setStatus] = useState(null);
  const [open, setOpen] = useState(true);
  const [sending, setSending] = useState(false);
  const [apiKey, setApiKey] = useState("");

  const toggle = id => setSelected(p => p.includes(id) ? p.filter(s => s !== id) : [...p, id]);

  const fetchNews = async () => {
    if (!selected.length) return;
    if (!apiKey) { setStatus({ type:"err", msg:"⚠️ Inserisci la tua Anthropic API Key nelle impostazioni" }); return; }
    setLoading(true); setNews([]);
    setStatus({ type:"info", msg:"🔍 Ricerca notizie in corso con AI + web search..." });
    const labels = { MSFS:"Microsoft Flight Simulator 2024 (MSFS)", XP:"X-Plane 12", DCS:"DCS World", FALCON:"Falcon BMS" };
    const topics = selected.map(s => labels[s]).join(", ");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "x-api-key": apiKey, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
        body: JSON.stringify({
          model:"claude-opus-4-5",
          max_tokens:2500,
          tools:[{ type:"web_search_20250305", name:"web_search" }],
          system:`Sei un aggregatore di notizie per simulatori di volo. Cerca le ultime notizie (ultimi 7 giorni) sui simulatori richiesti, inclusi sviluppatori di terze parti (PMDG, Aerosoft, Orbx, Eagle Dynamics, Laminar Research, FlyByWire, Benchmark Sims ecc.), aggiornamenti, nuovi rilasci, patch e DLC. Rispondi SOLO con un array JSON valido senza backtick. Formato esatto: [{"title":"Titolo","summary":"Riassunto 2-3 frasi in italiano","url":"https://...","simulator":"MSFS|DCS|X-Plane|Falcon BMS|General","source":"Nome sito"}] Includi 6-10 notizie. NON usare asterischi, underscore o caratteri speciali nei campi title e summary. I riassunti DEVONO essere in italiano.`,
          messages:[{ role:"user", content:`Trova le ultime notizie su: ${topics}. Includi anche notizie da sviluppatori di terze parti e community.` }]
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const txt = (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      const clean = txt.replace(/```json|```/g,"").trim();
      const match = clean.match(/\[[\s\S]*\]/);
      if (!match) throw new Error("Nessun JSON trovato nella risposta");
      const parsed = JSON.parse(match[0]);
      setNews(parsed);
      setStatus({ type:"ok", msg:`✅ Trovate ${parsed.length} notizie aggiornate` });
    } catch(e) { setStatus({ type:"err", msg:"❌ Errore: "+e.message }); }
    setLoading(false);
  };

  const sendTelegram = async (items) => {
    if (!token || !chatId) { setStatus({ type:"err", msg:"⚠️ Inserisci Bot Token e Chat ID nelle impostazioni" }); return; }
    setSending(true);
    setStatus({ type:"info", msg:`📤 Invio ${items.length} notizie su Telegram...` });
    try {
      const today = new Date();
      const dd = String(today.getDate()).padStart(2, '0');
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const yyyy = today.getFullYear();
      const goodMorning = `Buongiorno Piloti
Buon ${dd}/${mm}/${yyyy}
Ecco le news che ho trovato oggi riguardo ai nostri simulatori di volo preferiti
Buona lettura
Happy Landings
I-LAIR`;
      await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ chat_id: chatId, text: goodMorning, disable_web_page_preview: true })
      });
      await new Promise(r => setTimeout(r, 400));
    } catch(e) {
      setStatus({ type:"err", msg:`❌ Errore Telegram (buongiorno): ${e.message}` });
      setSending(false); return;
    }
    let ok = 0;
    for (const item of items) {
      const emo = { MSFS:"✈️", DCS:"🎯", "X-Plane":"🛩️", "Falcon BMS":"🦅", General:"🌐" }[item.simulator] || "📰";
      const source = item.source ? ` | ${item.source}` : "";
      const msg = `${emo} ${item.title}${source}

${item.summary}

🔗 ${item.url || ""}`;
      try {
        const r = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({ chat_id: chatId, text: msg, disable_web_page_preview: false })
        });
        const d = await r.json();
        if (d.ok) ok++; else throw new Error(d.description);
      } catch(e) { setStatus({ type:"err", msg:`❌ Errore Telegram: ${e.message}` }); setSending(false); return; }
      await new Promise(r => setTimeout(r, 600));
    }
    setStatus({ type:"ok", msg:`✅ ${ok}/${items.length} notizie inviate su Telegram!` });
    setSending(false);
  };

  const statusColors = { ok:"#27ae60", err:"#e74c3c", info:"#3498db" };

  return <div style={{ fontFamily:"system-ui,sans-serif", maxWidth:780, margin:"0 auto", padding:20, background:"#070711", minHeight:"100vh", color:"#ddd" }}>
    <div style={{ textAlign:"center", marginBottom:28 }}>
      <div style={{ display:"flex", justifyContent:"center", alignItems:"center", gap:20, marginBottom:14, flexWrap:"wrap" }}>
        <img src={LOGOS.MSFS} alt="MSFS" style={{ height:28, width:"auto", objectFit:"contain" }} />
        <img src={LOGOS.XP} alt="X-Plane" style={{ height:28, width:"auto", objectFit:"contain" }} />
        <img src={LOGOS.DCS} alt="DCS" style={{ height:28, width:"auto", objectFit:"contain" }} />
        <img src={LOGOS.FALCON} alt="Falcon BMS" style={{ height:28, width:"auto", objectFit:"contain" }} />
      </div>
      <h1 style={{ margin:0, fontSize:20, color:"#fff", fontWeight:800 }}>FlightSim News Bot</h1>
      <p style={{ margin:"6px 0 4px", color:"#9ca3af", fontSize:13, fontWeight:600 }}>Notizie dal mondo della simulazione di volo By Loreair</p>
      <a href="https://www.youtube.com/@LOREAIR" target="_blank" rel="noopener noreferrer" style={{ display:"inline-flex", alignItems:"center", gap:8, padding:"6px 12px", borderRadius:999, background:"linear-gradient(135deg,#ff0000,#7f1d1d)", color:"#fff", fontSize:12, textDecoration:"none", fontWeight:800, boxShadow:"0 6px 18px rgba(255,0,0,.15)" }}>▶ YouTube • @LOREAIR</a>
    </div>

    <div style={{ background:"#12122a", borderRadius:14, padding:16, marginBottom:18, border:"1px solid #1e1e3f" }}>
      <div onClick={()=>setOpen(!open)} style={{ cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center", userSelect:"none" }}>
        <span style={{ fontWeight:700, color:"#aaa", fontSize:14 }}>⚙️ Impostazioni</span>
        <span style={{ color:"#555", fontSize:12 }}>{open ? "▲ chiudi" : "▼ apri"}</span>
      </div>
      {open && <div style={{ marginTop:14, display:"flex", flexDirection:"column", gap:10 }}>
        <div><label style={{ fontSize:12, color:"#888", display:"block", marginBottom:4 }}>🔑 Anthropic API Key</label><input value={apiKey} onChange={e=>setApiKey(e.target.value)} type="password" placeholder="sk-ant-api03-..." style={{ width:"100%", padding:"9px 12px", borderRadius:8, border:"1px solid #2a2a4a", background:"#0a0a1a", color:"#fff", fontSize:13, boxSizing:"border-box" }} /></div>
        <div><label style={{ fontSize:12, color:"#888", display:"block", marginBottom:4 }}>🤖 Bot Token (da BotFather)</label><input value={token} onChange={e=>setToken(e.target.value)} type="password" placeholder="1234567890:AAFxxx..." style={{ width:"100%", padding:"9px 12px", borderRadius:8, border:"1px solid #2a2a4a", background:"#0a0a1a", color:"#fff", fontSize:13, boxSizing:"border-box" }} /></div>
        <div><label style={{ fontSize:12, color:"#888", display:"block", marginBottom:4 }}>📢 Chat ID / Username canale</label><input value={chatId} onChange={e=>setChatId(e.target.value)} placeholder="@LoreairOfficial" style={{ width:"100%", padding:"9px 12px", borderRadius:8, border:"1px solid #2a2a4a", background:"#0a0a1a", color:"#fff", fontSize:13, boxSizing:"border-box" }} /></div>
      </div>}
    </div>

    <div style={{ display:"flex", gap:10, marginBottom:18, flexWrap:"wrap" }}>
      {SIMS.map(s => <button key={s.id} onClick={()=>toggle(s.id)} style={{ padding:"8px 14px", borderRadius:22, cursor:"pointer", border:`2px solid ${selected.includes(s.id) ? s.color : "#2a2a4a"}`, background:selected.includes(s.id) ? s.color+"22" : "transparent", transition:"all .2s", display:"flex", alignItems:"center", gap:8 }}><img src={LOGOS[s.id]} alt={s.label} style={{ height:20, width:"auto", objectFit:"contain", opacity: selected.includes(s.id) ? 1 : 0.35 }} /><span style={{ fontWeight:700, fontSize:13, color: selected.includes(s.id) ? "#fff" : "#555" }}>{s.label}</span></button> )}
    </div>

    <div style={{ display:"flex", gap:10, marginBottom:18 }}>
      <button onClick={fetchNews} disabled={loading || !selected.length} style={{ flex:1, padding:"13px 20px", borderRadius:10, border:"none", background:loading ? "#1e1e3f" : "linear-gradient(135deg,#6366f1,#8b5cf6)", color:loading ? "#555" : "#fff", cursor:loading ? "not-allowed" : "pointer", fontWeight:800, fontSize:15, transition:"all .2s" }}>{loading ? "⏳ Ricerca in corso..." : "🔍 Cerca ultime notizie"}</button>
      {news.length > 0 && <button onClick={()=>sendTelegram(news)} disabled={sending} style={{ padding:"13px 20px", borderRadius:10, border:"none", background:sending ? "#1e1e3f" : "#0088cc", color:sending ? "#555" : "#fff", cursor:sending ? "not-allowed" : "pointer", fontWeight:700, fontSize:14, whiteSpace:"nowrap" }}>{sending ? "⏳ Invio..." : `📤 Invia tutto (${news.length})`}</button>}
    </div>

    {status && <div style={{ padding:"10px 14px", borderRadius:8, marginBottom:16, fontSize:13, background:statusColors[status.type]+"18", border:`1px solid ${statusColors[status.type]}33`, color:statusColors[status.type] }}>{status.msg}</div>}

    <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
      {news.map((item,i) => <div key={i} style={{ background:"#12122a", borderRadius:12, padding:16, border:"1px solid #1e1e3f", borderLeft:`4px solid ${SIM_COLORS[item.simulator]||"#7f8c8d"}` }}><div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8, gap:8, flexWrap:"wrap" }}><Badge sim={item.simulator||"General"} />{item.source && <span style={{ fontSize:11, color:"#555" }}>{item.source}</span>}</div><h3 style={{ margin:"0 0 8px", fontSize:15, color:"#f0f0f0", lineHeight:1.4, fontWeight:700 }}>{item.title}</h3><p style={{ margin:"0 0 12px", fontSize:13, color:"#888", lineHeight:1.6 }}>{item.summary}</p><div style={{ display:"flex", alignItems:"center", gap:12 }}><a href={item.url} target="_blank" rel="noopener noreferrer" style={{ fontSize:12, color:"#6366f1", textDecoration:"none", fontWeight:600 }}>🔗 Leggi articolo</a><button onClick={()=>sendTelegram([item])} disabled={sending} style={{ marginLeft:"auto", padding:"5px 12px", borderRadius:6, border:"none", background:"#0088cc22", color:"#0088cc", cursor:"pointer", fontSize:12, fontWeight:700 }}>📤 Invia</button></div></div> )}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
