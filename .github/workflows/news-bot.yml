name: FlightSim News Bot

on:
  schedule:
    # Dal 17 aprile in poi: ogni 3 giorni alle 06:30 CEST (= 04:30 UTC, ora estiva)
    # In inverno (CET = UTC+1) aggiornare in: '30 5 */3 * *'
    - cron: '30 4 */3 * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0   # necessario per git pull --rebase

    - name: Setup Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm install cheerio axios rss-parser @anthropic-ai/sdk

    - name: Run bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      run: node bot.js

    - name: Salva cache sent_links nel repo
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git pull --rebase origin main
        git add sent_links.json
        git diff --cached --quiet && echo "Nessuna modifica alla cache, skip commit." && exit 0
        git commit -m "chore: update sent_links cache [skip ci]"
        git push origin main
